# ═══════════════════════════════════════════════════════════
# MIHANONA — Backend Configuration
# Dev environment: all values are hardcoded
# Prod environment: replace with env variables
# ═══════════════════════════════════════════════════════════

spring:
  application:
    name: mihanona-backend

  # ─────────────────────────────────────────────
  # DATABASE — PostgreSQL (running in Docker)
  # ─────────────────────────────────────────────
  datasource:
    url: jdbc:postgresql://localhost:5432/mihanona_db
    username: mihanona_user
    password: mihanona_local
    driver-class-name: org.postgresql.Driver

  # ─────────────────────────────────────────────
  # JPA / HIBERNATE
  # ddl-auto: validate = Spring NEVER creates tables
  # Flyway owns the schema. Always.
  # ─────────────────────────────────────────────
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

  # ─────────────────────────────────────────────
  # FLYWAY — runs SQL files in order (V1, V2, V3...)
  # ─────────────────────────────────────────────
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false

  # ─────────────────────────────────────────────
  # REDIS — caching + sessions
  # ─────────────────────────────────────────────
  data:
    redis:
      host: localhost
      port: 6379
      password: redis_local

  # ─────────────────────────────────────────────
  # MAIL — MailDev for dev (NOT Gmail!)
  # View emails at: http://localhost:1080
  # ─────────────────────────────────────────────
  mail:
    host: localhost
    port: 1025
    username: ""
    password: ""
    properties:
      mail:
        smtp:
          auth: false
          starttls:
            enable: false

# ─────────────────────────────────────────────
# SERVER
# ─────────────────────────────────────────────
server:
  port: 8080
  servlet:
    context-path: /api/v1     # Every URL starts with /api/v1

# ─────────────────────────────────────────────
# OUR APP CONFIG
# JWT token settings
# ─────────────────────────────────────────────
app:
  jwt:
    secret: mihanona-dev-secret-key-minimum-32-characters-long
    access-token-expiry: 900        # 15 minutes in seconds
    refresh-token-expiry: 604800    # 7 days in seconds