<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Verify your email</title>
</head>
<body style="font-family: Arial, sans-serif; background-color: #f5f0e6; padding: 24px;">
<div style="max-width: 480px; margin: 0 auto; background: white; padding: 32px; border-radius: 8px;">
    <h2 style="color: #1a4d3e;">Welcome to Mihanona, <span th:text="${fullName}">there</span>!</h2>
    <p>Click the button below to verify your email and activate your account.</p>
    <a th:href="${verifyUrl}"
       style="display:inline-block; background:#1a4d3e; color:white; padding:12px 24px; text-decoration:none; border-radius:6px; margin-top:16px;">
        Verify my email
    </a>
    <p style="color:#888; font-size:12px; margin-top:24px;">This link expires in 24 hours.</p>
</div>
</body>
</html>
